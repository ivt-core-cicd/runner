name: Submódulo - Entrega Continua (CD)

on:
  workflow_call:
    inputs:
      env_target:
        required: true
        type: string
      parent_run_id:
        required: true
        type: string

jobs:
  execute_cd:
    name: Desplegar Artefactos Multi-Cloud [CD Orquestador - ${{ github.repository_owner }} ]
    runs-on: ubuntu-latest
    # Vincula entornos protegidos de forma dinámica
    environment: ${{ inputs.env_target == 'production' && 'main' || inputs.env_target }}
    permissions:
      contents: write
    steps:
      # =======================================================================
      # PASO 1: Descargar el paquete unificado (Mismo nombre que el maestro)
      # =======================================================================
      - name: Descargar Paquete de Trabajo con Binarios Certificados
        uses: actions/download-artifact@v4
        with:
          name: workspace-package # 🎯 Sincronizado con el maestro
          path: .
          run-id: ${{ inputs.parent_run_id }}
      
      - name: Cargar Token de Aplicación desde Artefacto
        id: load_token
        run: |
          TARGET_FILE="$GITHUB_WORKSPACE/src/token_github_repo_original_tmp.txt"
          
          if [ ! -f "$TARGET_FILE" ]; then
            echo "🛑 ERROR INTERNO: No se encontró el archivo del token en $TARGET_FILE"
            exit 1
          fi

          TOKEN_APP=$(cat "$TARGET_FILE")
          
          # Imprimimos la longitud del token para validar si está vacío SIN exponerlo en los logs
          echo "📏 Longitud del token recuperado: ${#TOKEN_APP} caracteres"
          
          if [ ${#TOKEN_APP} -lt 10 ]; then
            echo "🛑 ERROR: El token recuperado es demasiado corto o está vacío."
            exit 1
          fi
          
          echo "token_github_repo_original=$TOKEN_APP" >> $GITHUB_OUTPUT
          # Lo eliminamos inmediatamente por seguridad usando la ruta completa
          rm "$TARGET_FILE"

      # =======================================================================
      # PASO 2: Detectar el Proveedor y Destino Básicos
      # =======================================================================
      - name: Parsear Proveedor y Destino
        id: parse_payload
        run: |
          JSON_PATH="$GITHUB_WORKSPACE/src/payload.json"
          PROVIDER=$(jq -r '.provider' "$JSON_PATH" | tr -d '\r\n[:space:]')
          ORG=$(jq -r '.origin.owner' "$JSON_PATH" | tr -d '\r\n[:space:]')
          REPO_RAW=$(jq -r '.origin.repo' "$JSON_PATH" | tr -d '\r\n[:space:]')
          
          if [[ "$REPO_RAW" == *"/"* ]]; then REPO_NAME=$(echo "$REPO_RAW" | cut -d'/' -f2); else REPO_NAME="$REPO_RAW"; fi
          
          echo "provider=$PROVIDER" >> $GITHUB_OUTPUT
          echo "target_repo=${ORG}/${REPO_NAME}" >> $GITHUB_OUTPUT

      
      # =======================================================================
      # PASO 3: Ejecución Multi-Proveedor Híbrida 100% Delegada
      # =======================================================================
      - name: Ejecutar Pipeline de Despliegue Híbrido (Bash CD)
        env:
          # Inyectamos el Vault completo como variable de entorno segura en RAM
          # Los scripts de Bash se encargarán de parsearlo internamente
          SECURE_VAULT: ${{ secrets.SECURE_VAULT }}
          TOKEN_REPO_ORIGINAL: ${{ steps.load_token.outputs.token_github_repo_original }}
        run: |
          # 1. Asegurar permisos de ejecución de forma absoluta usando variables de entorno de GitHub
          chmod +x $GITHUB_WORKSPACE/src/templates-cicd/*.sh
          
          # 2. Posicionarse en el código de la aplicación
          cd $GITHUB_WORKSPACE/src/app-code
          
          # 3. Delegar la orquestación pasando el payload y el entorno meta
          $GITHUB_WORKSPACE/src/templates-cicd/run-cd.sh $GITHUB_WORKSPACE/src/payload.json "${{ inputs.env_target }}"

      # =======================================================================
      # PASO 4: OPCIÓN B - Despliegue Nativo de GitHub Pages por API (Evita Error 128)
      # =======================================================================
      - name: Desplegar en GitHub Pages (Repo Origen)
        # 🎯 SÓLO SE EJECUTA SI EL PROVEEDOR ES GITHUB
        if: steps.parse_payload.outputs.provider == 'githubpage'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ steps.load_token.outputs.token_github_repo_original }}
          external_repository: ${{ steps.parse_payload.outputs.target_repo }}
          publish_dir: ${{ steps.parse_payload.outputs.publish_dir }}
          publish_branch: gh-pages
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          nojekyll: true
      
      # =======================================================================
      # PASO 5: Forzar la Activación Automática (Ahora que la rama YA existe)
      # =======================================================================
      - name: Garantizar Activación de GitHub Pages vía API
        if: steps.parse_payload.outputs.provider == 'githubpage'
        run: |
          TARGET_REPO="${{ steps.parse_payload.outputs.target_repo }}"
          TOKEN="${{ steps.load_token.outputs.token_github_repo_original }}"
          
          echo "📡 Forzando activación de Pages para: $TARGET_REPO..."
          
          # Esperamos 3 segundos rápidos para asegurar la propagación de la rama remota
          sleep 3
          
          # Enviamos la petición de activación
          curl -s -X POST \
            -H "Authorization: token $TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${TARGET_REPO}/pages" \
            -d '{"source":{"branch":"gh-pages","path":"/"}}' \
            -o /dev/null -w "%{http_code}" | grep -E "201|409" || true