name: Orquestador Central Multi-Cloud y Multi-Stack

on:
  repository_dispatch:
    types: [deploy_trigger]

permissions:
  contents: write   # Permite la creación y push de la rama gh-pages
  actions: write    # Requerido por tu job catch_errors para disparar el webhook de erro
jobs:
  orchestrator_init:
    name: 🚀 1. Inicializar Descargar Componentes en RAM
    runs-on: ubuntu-latest
    environment: ${{ github.event.client_payload.origin_branch == 'production' && 'main' || 'development' }}

    outputs:
      token_github_repo_original: ${{ steps.get_token_repo_org_origin.outputs.token }}
    steps:
      # =======================================================================
      # PASO 0: Control de accesos mediante Variable de Organización (Lista Blanca)
      # =======================================================================
      - name: Validar Organización Emisora Autorizada
        env:
          ALLOWED_LIST: ${{ vars.ALLOWED_ORGANIZATIONS }}
        run: |
          ORG_EMISORA="${{ github.event.client_payload.origin.owner }}"
          echo "🔍 Evaluando peticion de la organizacion: $ORG_EMISORA"

          if [ -z "$ALLOWED_LIST" ]; then
            echo "🛑 ERROR CRÍTICO: La variable organizacional ALLOWED_ORGANIZATIONS esta vacia."
            echo "Solucion agrega tu organización a las variables del repositorio central."
            exit 1
          fi

          # Convertimos comas en espacios para validar de forma nativa en Bash
          if [[ " ${ALLOWED_LIST//,/ } " =~ " $ORG_EMISORA " ]]; then
            echo "✅ Organizacion [$ORG_EMISORA] autorizada con exito."
          else
            echo "🛑 ERROR CRÍTICO: Organizacion [$ORG_EMISORA] NO autorizada en la lista blanca."
            exit 1
          fi

      #######################################################################
      ##  PASO 1. Autenticación automática con la GitHub App (.pem)    ######
      #######################################################################
      - name: Generar Token de Accesos para descarga de codigo desde ${{ github.event.client_payload.origin.owner }}.
        id: get_token_repo_org_origin
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.event.client_payload.origin.owner }} # Apunta automáticamente a la organización donde es llamada.

      #######################################################################
      ##  PASO 2. Descarga codigo del repositorio  privado             ######
      #######################################################################
      - name: Descargar Codigo Origen
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.client_payload.origin.repo }}
          token: ${{ steps.get_token_repo_org_origin.outputs.token }}
          ref: ${{ contains(github.event.client_payload.origin.ref, '/') && github.event.client_payload.origin.ref || format('refs/tags/{0}', github.event.client_payload.origin.ref) }}
          path: src/app-code

      #######################################################################
      ##  PASO 3. Autenticación automática con la GitHub App (.pem)    ######
      #######################################################################
      - name: Generar Token de Accesos para plantillas ${{ github.repository_owner }}.
        id: get_token_org_core
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }} # Apunta automáticamente a la organización donde es llamada.

      #######################################################################
      ##  PASO 3. Descarga templates  de despleigue cicd               ######
      #######################################################################
      - name: Descargar plantillas de despliegue ci/cd
        uses: actions/checkout@v4
        with:
          repository: ivt-core-cicd/templates_cicd
          token: ${{ steps.get_token_org_core.outputs.token }}
          ref: main
          path: src/templates-cicd

      ########################################################################
      ## PASO 4: Inyección del Payload JSON de control                    ####
      ########################################################################
      - name: Inyectar Datos del Evento de Control
        run: |
          echo '${{ toJson(github.event.client_payload) }}' > src/payload.json

      #######################################################################
      ##  PASO 5. Descarga templates de aprovicionamiento con iac      ######
      #######################################################################
      - name: Descargar plantillas iac
        uses: actions/checkout@v4
        with:
          repository: ivt-core-cicd/templates_iac
          token: ${{ steps.get_token_org_core.outputs.token }}
          ref: main
          path: src/templates-iac

      #######################################################################
      ##  PASO 6. Guardar el codigo en un Artefacto unico              ######
      #######################################################################
      - name: Guardar Artefacto  de codigos
        uses: actions/upload-artifact@v4
        with:
          name: workspace-package
          path: .
          retention-days: 1

  # =======================================================================
  # PASO 7: Delegación en cascada a los submódulos especializados
  # =======================================================================
  run_ci:
    name: 2. Integración Continua [CI Orquestador - ${{ github.repository_owner }} ]
    needs: orchestrator_init
    uses: ./.github/workflows/ci_orchestrator.yml
    with:
      # Pasamos el ID de la ejecución actual de forma nativa
      parent_run_id: ${{ github.run_id }}
    secrets: inherit

  run_cd:
    name: 3. Entrega Continua Híbrida [CD Orquestador - ${{ github.repository_owner }} ]
    needs: run_ci
    uses: ./.github/workflows/cd_orchestrator.yml
    with:
      # Pasamos el ID de la ejecución actual de forma nativa
      parent_run_id: ${{ github.run_id }}
      env_target: ${{ github.event.client_payload.origin.env }}
    secrets: 
      SECURE_VAULT: ${{ secrets.SECURE_VAULT }}
      TOKEN_REPO_ORIGINAL: ${{ needs.orchestrator_init.outputs.token_github_repo_original }}

  # ... (Tus jobs orchestrator_init, run_ci y run_cd se quedan tal cual los tienes) ...

  catch_errors:
    name: Capturador Global de Errores
    needs: [orchestrator_init, run_ci, run_cd]
    # 🔥 CLAVE: Solo se ejecuta si ALGUNO de los 3 jobs anteriores falló o fue cancelado
    if: failure() || cancelled()
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      # Usamos el token interno del Core porque le vamos a pegar a nuestro propio repositorio
      - name: Generar Token Core Central
        id: get_core_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Disparar Handler de Errores (Fire & Forget)
        run: |
          # Detectamos rápidamente cuál de los jobs fue el que se rompió
          FAILED_STEP="Desconocido"
          if [ "${{ needs.orchestrator_init.result }}" = "failure" ]; then FAILED_STEP="1. Inicializar RAM"; fi
          if [ "${{ needs.run_ci.result }}" = "failure" ]; then FAILED_STEP="2. Integracion Continua"; fi
          if [ "${{ needs.run_cd.result }}" = "failure" ]; then FAILED_STEP="3. Entrega Continua"; fi

          curl -X POST \
            -H "Authorization: Bearer ${{ steps.get_core_token.outputs.token }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/error_handler.yml/dispatches \
            -d '{
              "ref": "main",
              "inputs": {
                "origin_owner": "${{ github.event.client_payload.origin.owner }}",
                "origin_repo": "${{ github.event.client_payload.origin.repo }}",
                "origin_sha": "${{ github.event.client_payload.origin.sha }}",
                "failed_job": "'"$FAILED_STEP"'",
                "parent_run_id": "${{ github.run_id }}"
              }
            }'
